<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veil — Daily Tarot</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&family=Quattrocento+Sans:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0d0b10;
    --parchment: #f5efe6;
    --gold: #c9a84c;
    --gold-light: #e8cc7a;
    --mist: #8b7fa0;
    --deep: #1a1228;
    --card-bg: #13101a;
    --accent: #7c5cbf;
    --blush: #d4a5a5;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Cormorant Garamond', serif;
    background: var(--ink);
    color: var(--parchment);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── STARFIELD ── */
  #stars {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background: radial-gradient(ellipse at 20% 30%, #1e1535 0%, #0d0b10 60%);
  }
  #stars::before, #stars::after {
    content: '';
    position: absolute; inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 50%, rgba(255,255,255,.4) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 55% 15%, rgba(201,168,76,.7) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 80%, rgba(255,255,255,.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 35%, rgba(255,255,255,.3) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 15% 70%, rgba(201,168,76,.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 45% 90%, rgba(255,255,255,.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 92% 60%, rgba(255,255,255,.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 45%, rgba(201,168,76,.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 25% 85%, rgba(255,255,255,.3) 0%, transparent 100%);
    background-size: 100% 100%;
  }

  /* ── LAYOUT ── */
  #app {
    position: relative; z-index: 1;
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 0 20px 40px;
  }

  header {
    text-align: center;
    padding: 48px 0 32px;
  }
  .logo {
    font-family: 'Cinzel', serif;
    font-size: clamp(2rem, 6vw, 3.2rem);
    font-weight: 600;
    letter-spacing: .3em;
    color: var(--gold);
    text-shadow: 0 0 40px rgba(201,168,76,.3);
  }
  .logo-sub {
    font-size: .85rem;
    letter-spacing: .25em;
    color: var(--mist);
    margin-top: 6px;
    font-style: italic;
  }

  /* ── SCREENS ── */
  .screen {
    display: none; flex-direction: column; align-items: center;
    width: 100%; max-width: 560px;
    animation: fadeUp .6s ease both;
  }
  .screen.active { display: flex; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── INTENTION SCREEN ── */
  .intention-title {
    font-size: clamp(1.4rem, 4vw, 1.9rem);
    font-weight: 300;
    font-style: italic;
    color: var(--parchment);
    text-align: center;
    margin-bottom: 32px;
    line-height: 1.5;
  }
  .focus-label {
    font-family: 'Cinzel', serif;
    font-size: .7rem;
    letter-spacing: .2em;
    color: var(--mist);
    margin-bottom: 14px;
  }
  .focus-pills {
    display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;
    margin-bottom: 28px;
  }
  .pill {
    padding: 8px 20px;
    border: 1px solid rgba(201,168,76,.3);
    border-radius: 40px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    font-style: italic;
    color: var(--mist);
    background: transparent;
    cursor: pointer;
    transition: all .25s;
  }
  .pill:hover { border-color: var(--gold); color: var(--gold-light); }
  .pill.selected {
    border-color: var(--gold);
    background: rgba(201,168,76,.12);
    color: var(--gold-light);
  }

  textarea {
    width: 100%;
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(201,168,76,.2);
    border-radius: 12px;
    color: var(--parchment);
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    font-style: italic;
    padding: 16px 20px;
    resize: none;
    outline: none;
    transition: border-color .25s;
    margin-bottom: 28px;
    line-height: 1.6;
  }
  textarea::placeholder { color: rgba(139,127,160,.5); }
  textarea:focus { border-color: rgba(201,168,76,.5); }

  .btn-primary {
    font-family: 'Cinzel', serif;
    font-size: .8rem;
    letter-spacing: .2em;
    color: var(--ink);
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    border: none;
    border-radius: 40px;
    padding: 14px 40px;
    cursor: pointer;
    transition: all .25s;
    box-shadow: 0 4px 20px rgba(201,168,76,.25);
  }
  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(201,168,76,.4);
  }
  .btn-primary:disabled { opacity: .4; cursor: default; transform: none; }

  /* ── DRAW SCREEN ── */
  .draw-prompt {
    font-size: clamp(1.1rem, 3vw, 1.4rem);
    font-style: italic;
    color: var(--mist);
    text-align: center;
    margin-bottom: 48px;
    line-height: 1.6;
  }

  .card-spread {
    display: flex; gap: 20px; justify-content: center;
    margin-bottom: 48px;
    perspective: 800px;
  }

  .tarot-card {
    width: 90px; height: 150px;
    border-radius: 10px;
    cursor: pointer;
    position: relative;
    transform-style: preserve-3d;
    transition: transform .6s cubic-bezier(.23,1,.32,1), box-shadow .3s;
    box-shadow: 0 4px 20px rgba(0,0,0,.6);
  }
  .tarot-card:hover {
    transform: translateY(-12px) rotateY(5deg);
    box-shadow: 0 16px 40px rgba(201,168,76,.25);
  }
  .tarot-card.selected {
    transform: translateY(-20px) scale(1.08);
    box-shadow: 0 20px 50px rgba(201,168,76,.5);
  }

  .card-back {
    width: 100%; height: 100%;
    border-radius: 10px;
    background: var(--card-bg);
    border: 1px solid rgba(201,168,76,.3);
    display: flex; align-items: center; justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .card-back::before {
    content: '';
    position: absolute; inset: 6px;
    border: 1px solid rgba(201,168,76,.15);
    border-radius: 6px;
  }
  .card-back::after {
    content: '✦';
    font-size: 1.8rem;
    color: rgba(201,168,76,.4);
  }

  /* ── REVEAL SCREEN ── */
  .reveal-wrap {
    display: flex; flex-direction: column; align-items: center;
    width: 100%;
  }

  .card-reveal {
    width: 140px; height: 234px;
    border-radius: 14px;
    background: linear-gradient(160deg, #1e1535, #0d0b10);
    border: 1px solid rgba(201,168,76,.5);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 12px;
    box-shadow: 0 0 60px rgba(201,168,76,.2), 0 20px 60px rgba(0,0,0,.8);
    position: relative;
    overflow: hidden;
    margin-bottom: 32px;
    animation: cardReveal .8s cubic-bezier(.23,1,.32,1) both;
  }
  @keyframes cardReveal {
    from { opacity: 0; transform: scale(.85) rotateY(20deg); }
    to   { opacity: 1; transform: scale(1) rotateY(0deg); }
  }
  .card-reveal::before {
    content: '';
    position: absolute; inset: 8px;
    border: 1px solid rgba(201,168,76,.2);
    border-radius: 8px;
  }
  .card-glow {
    position: absolute; inset: -20px;
    background: radial-gradient(circle at 50% 50%, rgba(201,168,76,.1), transparent 70%);
    pointer-events: none;
  }
  .card-symbol { font-size: 2.8rem; }
  .card-name-on-card {
    font-family: 'Cinzel', serif;
    font-size: .6rem;
    letter-spacing: .15em;
    color: var(--gold);
    text-align: center;
    padding: 0 10px;
  }

  .card-name-big {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.2rem, 4vw, 1.8rem);
    color: var(--gold);
    letter-spacing: .1em;
    text-align: center;
    margin-bottom: 6px;
  }
  .card-archetype {
    font-size: .9rem;
    font-style: italic;
    color: var(--mist);
    letter-spacing: .1em;
    margin-bottom: 24px;
  }

  /* ── READING BOX ── */
  .reading-box {
    width: 100%;
    background: rgba(255,255,255,.03);
    border: 1px solid rgba(201,168,76,.15);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 24px;
    position: relative;
  }
  .reading-box::before {
    content: '✦';
    position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
    background: var(--ink);
    padding: 0 8px;
    color: var(--gold);
    font-size: .8rem;
  }
  .reading-text {
    font-size: clamp(1rem, 2.5vw, 1.15rem);
    line-height: 1.85;
    color: var(--parchment);
    font-weight: 300;
    font-style: italic;
  }
  .reading-loading {
    display: flex; align-items: center; gap: 10px;
    color: var(--mist); font-style: italic;
  }
  .dot-pulse span {
    display: inline-block; width: 6px; height: 6px;
    border-radius: 50%; background: var(--gold);
    animation: pulse 1.2s ease-in-out infinite;
    margin: 0 2px;
  }
  .dot-pulse span:nth-child(2) { animation-delay: .2s; }
  .dot-pulse span:nth-child(3) { animation-delay: .4s; }
  @keyframes pulse {
    0%,80%,100% { opacity: .3; transform: scale(.8); }
    40% { opacity: 1; transform: scale(1); }
  }

  /* ── REFLECTION ── */
  .reflection-section {
    width: 100%;
    margin-top: 8px;
    border-top: 1px solid rgba(201,168,76,.1);
    padding-top: 24px;
  }
  .reflection-q {
    font-family: 'Cinzel', serif;
    font-size: .7rem;
    letter-spacing: .2em;
    color: var(--mist);
    margin-bottom: 14px;
  }
  .mood-row {
    display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px;
  }
  .mood-btn {
    padding: 7px 16px;
    border: 1px solid rgba(255,255,255,.1);
    border-radius: 30px;
    background: transparent;
    color: var(--mist);
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    font-style: italic;
    cursor: pointer;
    transition: all .2s;
  }
  .mood-btn:hover, .mood-btn.selected {
    border-color: var(--gold);
    color: var(--gold-light);
    background: rgba(201,168,76,.08);
  }

  .save-note {
    width: 100%;
    background: rgba(255,255,255,.03);
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 10px;
    color: var(--parchment);
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    padding: 12px 16px;
    resize: none;
    outline: none;
    margin-bottom: 16px;
    line-height: 1.6;
    transition: border-color .2s;
  }
  .save-note::placeholder { color: rgba(139,127,160,.4); }
  .save-note:focus { border-color: rgba(201,168,76,.3); }

  .btn-row { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

  .btn-ghost {
    font-family: 'Cinzel', serif;
    font-size: .7rem;
    letter-spacing: .15em;
    color: var(--mist);
    background: transparent;
    border: 1px solid rgba(255,255,255,.15);
    border-radius: 30px;
    padding: 11px 28px;
    cursor: pointer;
    transition: all .2s;
  }
  .btn-ghost:hover { border-color: var(--gold); color: var(--gold); }

  /* ── DIVIDER ── */
  .divider {
    width: 60px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 20px auto;
  }
</style>
</head>
<body>
<div id="stars"></div>
<div id="app">
  <header>
    <div class="logo">VEIL</div>
    <div class="logo-sub">a daily reading</div>
  </header>

  <!-- INTENTION SCREEN -->
  <div class="screen active" id="screen-intention">
    <div class="intention-title">What are you carrying<br>into this moment?</div>

    <div class="focus-label">CHOOSE A FOCUS</div>
    <div class="focus-pills">
      <button class="pill" onclick="selectFocus(this,'Love')">Love</button>
      <button class="pill" onclick="selectFocus(this,'Career')">Career</button>
      <button class="pill" onclick="selectFocus(this,'Clarity')">Clarity</button>
      <button class="pill" onclick="selectFocus(this,'Healing')">Healing</button>
      <button class="pill" onclick="selectFocus(this,'Change')">Change</button>
      <button class="pill" onclick="selectFocus(this,'Purpose')">Purpose</button>
    </div>

    <textarea id="question-input" rows="3" placeholder="Describe what's weighing on you… or simply breathe and draw."></textarea>

    <button class="btn-primary" id="btn-draw" onclick="goDraw()">DRAW A CARD</button>
  </div>

  <!-- DRAW SCREEN -->
  <div class="screen" id="screen-draw">
    <div class="draw-prompt">Three cards wait.<br>Trust what pulls you.</div>
    <div class="card-spread" id="card-spread">
      <div class="tarot-card" onclick="chooseCard(0)"><div class="card-back"></div></div>
      <div class="tarot-card" onclick="chooseCard(1)"><div class="card-back"></div></div>
      <div class="tarot-card" onclick="chooseCard(2)"><div class="card-back"></div></div>
    </div>
  </div>

  <!-- REVEAL SCREEN -->
  <div class="screen" id="screen-reveal">
    <div class="reveal-wrap">
      <div class="card-reveal" id="reveal-card">
        <div class="card-glow"></div>
        <div class="card-symbol" id="reveal-symbol">☽</div>
        <div class="card-name-on-card" id="reveal-name-small">THE MOON</div>
      </div>
      <div class="card-name-big" id="reveal-name-big">The Moon</div>
      <div class="card-archetype" id="reveal-archetype">Illusion · The Unconscious · Hidden Truths</div>
      <div class="divider"></div>
      <div class="reading-box">
        <div id="reading-content" class="reading-loading">
          <span>The cards are speaking</span>
          <span class="dot-pulse"><span></span><span></span><span></span></span>
        </div>
      </div>
      <div class="reflection-section">
        <div class="reflection-q">HOW DOES THIS LAND?</div>
        <div class="mood-row" id="mood-row">
          <button class="mood-btn" onclick="selectMood(this,'Seen')">Seen</button>
          <button class="mood-btn" onclick="selectMood(this,'Curious')">Curious</button>
          <button class="mood-btn" onclick="selectMood(this,'Challenged')">Challenged</button>
          <button class="mood-btn" onclick="selectMood(this,'Calm')">Calm</button>
          <button class="mood-btn" onclick="selectMood(this,'Unsure')">Unsure</button>
        </div>
        <div class="btn-row">
          <button class="btn-primary" onclick="newReading()">NEW READING</button>
        </div>
      </div>
    </div>
  </div>

</div>



<script>
const TAROT_CARDS = [
  // ── MAJOR ARCANA ──
  { name: "The Fool",             symbol: "🌀", archetype: "Beginnings · Innocence · Leap of Faith",        meaning: "A new journey begins. You are being called to step into the unknown with an open heart. Trust, spontaneity, and fearless optimism are your guides. The Fool reminds you that every great adventure starts before you feel ready." },
  { name: "The Magician",         symbol: "⚡", archetype: "Will · Skill · Manifestation",                  meaning: "You have everything you need. Your tools — intellect, emotion, intuition, and body — are aligned. This is a moment of focused willpower. What you direct your attention toward, you can bring into being." },
  { name: "The High Priestess",   symbol: "☽", archetype: "Intuition · Mystery · Inner Knowing",            meaning: "The answer you seek is already inside you. Be still. The High Priestess guards the threshold between the conscious and unconscious — she asks you to trust what you sense beneath the surface, not just what you can prove." },
  { name: "The Empress",          symbol: "🌿", archetype: "Abundance · Nurturing · Creation",              meaning: "You are entering a season of fertile growth. Creativity, sensuality, and care are your natural state right now. The Empress invites you to slow down, tend to what you love, and trust that nourishment — given and received — is its own form of power." },
  { name: "The Emperor",          symbol: "🏔", archetype: "Structure · Authority · Foundation",            meaning: "It is time to build something that lasts. The Emperor asks: where do you need more discipline, more clarity, more decisive action? True authority begins with mastering yourself before directing anything else." },
  { name: "The Hierophant",       symbol: "🔑", archetype: "Tradition · Guidance · Belonging",              meaning: "You are being asked to examine the beliefs and structures you've inherited. Some are worth keeping; others may be worth questioning. Seek a teacher, a tradition, or a community — but make sure your path is truly yours." },
  { name: "The Lovers",           symbol: "∞", archetype: "Union · Choice · Alignment",                    meaning: "A significant choice stands before you — one that touches your deepest values. The Lovers is not just about romance; it is about alignment between what you feel and what you choose. When head and heart agree, you move with integrity." },
  { name: "The Chariot",          symbol: "◈", archetype: "Drive · Control · Victory",                     meaning: "You are capable of moving through obstacles with focused will. The Chariot asks you to hold opposing forces — confidence and doubt, urgency and patience — and move forward anyway. Victory comes from direction, not force." },
  { name: "Strength",             symbol: "☀", archetype: "Courage · Compassion · Inner Power",            meaning: "True strength is not loud. It is the quiet courage to stay open, to face what frightens you with gentleness, and to lead from love rather than fear. You are stronger than you believe — especially in the places you feel most fragile." },
  { name: "The Hermit",           symbol: "◉", archetype: "Solitude · Wisdom · Inner Light",               meaning: "Step back from the noise. The Hermit knows that wisdom comes through reflection, not reaction. A period of solitude or slowing down is not isolation — it is necessary restoration. What do you find when you stop and listen to yourself?" },
  { name: "Wheel of Fortune",     symbol: "⊕", archetype: "Cycles · Change · Fate",                        meaning: "Everything turns. What felt fixed is moving; what seemed lost may be returning. The Wheel of Fortune reminds you that you are not the only force at work — life has its own rhythms. Your task is to stay centered as things shift." },
  { name: "Justice",              symbol: "⚖", archetype: "Truth · Fairness · Cause & Effect",             meaning: "Every action has a consequence that will, in time, make itself known. Justice asks you to be honest — with yourself most of all. Where have you been avoiding a difficult truth? What decision requires you to act from integrity, not convenience?" },
  { name: "The Hanged Man",       symbol: "⟁", archetype: "Suspension · New Perspective · Surrender",      meaning: "You are being asked to pause. Not because you are stuck, but because stillness right now is the movement. The Hanged Man sees the world differently — surrender the need to force an outcome, and a new understanding will arrive." },
  { name: "Death",                symbol: "♦", archetype: "Endings · Transformation · Release",            meaning: "Something is ending so something else can begin. Death in tarot is rarely literal — it is the necessary closing of a chapter. What have you been holding onto past its time? Let it complete. Transformation cannot happen without release." },
  { name: "Temperance",           symbol: "△", archetype: "Balance · Patience · Integration",              meaning: "You are being called to find the middle path. Temperance is the art of blending opposites — not choosing between extremes but finding what is sustainable, what flows. Slow down. Integrate. There is deep alchemy in patience." },
  { name: "The Devil",            symbol: "⛓", archetype: "Shadow · Attachment · Liberation",              meaning: "What binds you is not as unbreakable as it appears. The Devil illuminates the patterns, addictions, or fears that keep you small. But look closely — the chains are often loosely worn. What would it mean to simply... choose differently?" },
  { name: "The Tower",            symbol: "◬", archetype: "Upheaval · Revelation · Sudden Change",         meaning: "What is crumbling was built on an unstable foundation. The Tower is disruptive, yes — but it clears what was never truly solid. After the shock comes clarity. What is falling away had to fall. What remains is real." },
  { name: "The Star",             symbol: "✦", archetype: "Hope · Healing · Renewal",                      meaning: "After difficulty, the Star arrives as a quiet, steady light. This is a card of healing and faith — not blind optimism, but the deep knowing that you are supported, that beauty is still possible, that the path forward exists even if you can't see it fully yet." },
  { name: "The Moon",             symbol: "☽", archetype: "Illusion · The Unconscious · Hidden Truths",    meaning: "Not everything is as it appears. The Moon stirs the unconscious — fears, dreams, and unresolved feelings may be surfacing. Pay attention to what you sense rather than what you see. Navigate by feeling right now, and trust the process even in the dark." },
  { name: "The Sun",              symbol: "☼", archetype: "Joy · Clarity · Vitality",                      meaning: "You are stepping into a moment of genuine brightness. The Sun brings clarity after confusion, warmth after isolation, and confidence after doubt. This is not performance — it is your authentic self, fully lit. Let yourself be seen." },
  { name: "Judgement",            symbol: "◎", archetype: "Awakening · Reckoning · Rebirth",               meaning: "A call is rising within you — one that asks you to rise above old stories and see yourself clearly. Judgement is not condemnation; it is liberation. Who are you becoming? What part of your past is ready to be forgiven, released, and transcended?" },
  { name: "The World",            symbol: "◌", archetype: "Completion · Integration · Wholeness",          meaning: "You have arrived. A significant cycle is completing, and the The World asks you to acknowledge how far you've come. This is not the end — it is integration. Everything you've learned, survived, and become is now part of you. Celebrate that." },

  // ── MINOR ARCANA · WANDS ──
  { name: "Ace of Wands",         symbol: "🔥", archetype: "Spark · Inspiration · New Energy",             meaning: "A burst of creative energy is available to you right now. The Ace of Wands is pure potential — a spark looking for kindling. Say yes to the idea that excites you. This is the moment to begin, not plan." },
  { name: "Two of Wands",         symbol: "🌐", archetype: "Vision · Planning · Bold Choices",             meaning: "You are standing at the edge of something larger than your current life. The Two of Wands asks: what is the bigger vision? Don't shrink to fit where you are. You are ready to plan a path toward something more expansive." },
  { name: "Three of Wands",       symbol: "⛵", archetype: "Expansion · Foresight · Progress",             meaning: "Your efforts are beginning to move. What you set in motion is now finding its legs. The Three of Wands invites you to keep your eyes on the horizon — expansion is underway, and patience will be rewarded." },
  { name: "Four of Wands",        symbol: "🎊", archetype: "Celebration · Homecoming · Stability",        meaning: "Pause and celebrate what you've built. The Four of Wands marks a moment of earned joy — a homecoming, a milestone, a moment of genuine stability. Let yourself feel it. Not everything needs to be chased. Some things deserve to be savored." },
  { name: "Five of Wands",        symbol: "⚔", archetype: "Conflict · Competition · Tension",             meaning: "There is friction in the air — competing ideas, clashing energies, or internal conflict. The Five of Wands asks you not to avoid it, but to engage with it consciously. Creative tension, when channeled well, produces something stronger." },

let state = { focus: null, question: '', card: null, mood: null, reading: '' };


function selectFocus(el, f) {
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('selected'));
  el.classList.add('selected');
  state.focus = f;
}

function selectMood(el, m) {
  document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  state.mood = m;
}

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
}

function goDraw() {
  state.question = document.getElementById('question-input').value.trim();
  showScreen('draw');
}

function chooseCard(idx) {
  const cards = document.querySelectorAll('.tarot-card');
  cards.forEach((c, i) => {
    c.classList.remove('selected');
    if (i !== idx) { c.style.opacity = '.4'; c.style.pointerEvents = 'none'; }
  });
  cards[idx].classList.add('selected');

  state.card = TAROT_CARDS[Math.floor(Math.random() * TAROT_CARDS.length)];
  setTimeout(() => doReveal(), 700);
}

function doReveal() {
  const c = state.card;
  document.getElementById('reveal-symbol').textContent = c.symbol;
  document.getElementById('reveal-name-small').textContent = c.name.toUpperCase();
  document.getElementById('reveal-name-big').textContent = c.name;
  document.getElementById('reveal-archetype').textContent = c.archetype;

  showScreen('reveal');

  document.getElementById('reading-content').innerHTML = `
    <span class="reading-loading">The cards are speaking
      <span class="dot-pulse"><span></span><span></span><span></span></span>
    </span>`;

  fetchReading(c);
}

async function fetchReading(card) {
  try {
    const res = await fetch("/api/reading", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        card: { name: card.name, archetype: card.archetype, meaning: card.meaning },
        focus: state.focus,
        question: state.question
      })
    });
    if (!res.ok) throw new Error('API error');
    const data = await res.json();
    state.reading = data.reading || '';
    document.getElementById('reading-content').className = 'reading-text';
    document.getElementById('reading-content').textContent = state.reading;
  } catch(e) {
    document.getElementById('reading-content').className = 'reading-text';
    document.getElementById('reading-content').textContent =
      `${card.name} arrives bearing the energy of ${card.archetype.toLowerCase()}. Something you've been circling is asking to be seen more clearly. What would it mean to stop moving around it—and instead, move toward it?`;
  }
}

function newReading() {
  state = { focus: null, question: '', card: null, mood: null, reading: '' };
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('selected'));
  document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('question-input').value = '';
  document.querySelectorAll('.tarot-card').forEach(c => {
    c.classList.remove('selected'); c.style.opacity = '1'; c.style.pointerEvents = '';
  });
  showScreen('intention');
}
</script>
